networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_DIAGRAM_AGENT_URL: ${DIAGRAM_AGENT_URL:?DIAGRAM_AGENT_URL is required}
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "${AGENT_PORT:-3001}:3001"
    environment:
      APP_URL: ${APP_URL:?APP_URL is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4.1-mini}
      KINDE_CLIENT_ID: ${KINDE_CLIENT_ID:-}
      KINDE_CLIENT_SECRET: ${KINDE_CLIENT_SECRET:-}
      KINDE_ISSUER_URL: ${KINDE_ISSUER_URL:-https://elevatics.kinde.com}
      KINDE_SITE_URL: ${KINDE_SITE_URL:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SQLITE_PATH: /app/data/mermaid-studio.db
      HOST: 0.0.0.0
      PORT: 3001
      TRUST_PROXY: ${TRUST_PROXY:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
